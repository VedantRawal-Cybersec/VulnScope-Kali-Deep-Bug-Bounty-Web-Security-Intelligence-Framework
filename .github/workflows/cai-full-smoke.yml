name: VulnScope Lean Smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip requests
      - run: python -m py_compile main.py vulnscope.py vulnscope_runtime.py
      - run: python main.py --version
      - run: python main.py --target https://example.com --yes --scan-mode passive --no-live-dashboard --max-pages 3 --max-depth 1 --request-budget 20 --request-timeout 5
      - run: test -f reports/output/vulnscope/example.com/report.json
