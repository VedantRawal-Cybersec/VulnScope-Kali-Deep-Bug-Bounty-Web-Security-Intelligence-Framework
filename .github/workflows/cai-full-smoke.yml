name: CAI Full Smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip pytest requests
      - run: |
          python -m py_compile \
            cai_error_handler.py cai_scope_guard.py cai_asset_graph.py \
            cai_target_profiler_cli.py cai_recon_agent_cli.py \
            cai_parameter_analysis_cli.py cai_hypothesis_agent_cli.py \
            cai_verification_agent_cli.py cai_evidence_engine_cli.py \
            cai_prioritization_cli.py cai_report_agent_cli.py \
            cai_learning_cli.py cai_adaptive_risk_cli.py \
            cai_business_logic_cli.py cai_feedback_cli.py \
            cai_safety_gate.py cai_superior_cli.py vulnscope.py main.py \
            core/live_dashboard.py core/ollama_brain.py core/react_loop.py \
            core/state_manager.py core/scope_guard.py core/tool_orchestrator.py \
            core/scan_state.py core/evidence_store.py core/http_client_v2.py \
            core/parameter_inventory.py core/parameter_extractor.py \
            core/crawler_v2.py core/browser_crawler.py core/crawler.py \
            core/test_engine.py core/vulnerability_tester.py core/ai_planner.py \
            core/reporting_v2.py core/agentic_framework.py core/agent_runtime.py \
            core/safe_analyzers.py core/colab_backend_api.py core/ollama_diagnostics.py \
            core/llm_gateway.py core/llm_policy.py core/reasoning_stream.py \
            core/prompt_injection_guard.py core/evidence_validator.py \
            core/llm_memory.py core/tool_router.py core/autonomous_scan_engine.py
      - run: python -m pytest tests/test_cai_superior_layer01.py tests/test_cai_confidence_policy.py tests/test_safe_react_loop.py tests/test_live_dashboard.py tests/test_tool_orchestrator.py tests/test_autonomous_scan_engine.py tests/test_llm_reasoning_runtime.py -q
