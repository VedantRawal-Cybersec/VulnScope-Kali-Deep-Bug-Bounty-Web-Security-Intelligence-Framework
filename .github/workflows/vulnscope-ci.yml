name: VulnScope CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  python-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install minimal dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt || true; fi
          pip install requests pyyaml rich

      - name: Compile all Python files
        run: python -m compileall .

      - name: CLI smoke tests
        run: |
          python hunt.py --version
          python ai_provider_cli.py --status
          python benchmark_cli.py --list
          python dashboard_cli.py --once
          python hunt.py --init-scope-policy --scope-policy /tmp/scope_policy.yaml

      - name: Safe dry-run workflow smoke test
        run: |
          cp scope_policy.example.yaml scope_policy.yaml
          python hunt.py --target https://example.com --mode bounty --agent-core --model-council --dry-run --quality --report-v2 --yes || true
