name: VulnScope Advanced Orchestration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  compile-advanced:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Compile advanced modules
        run: |
          python -m py_compile \
            core/browser_network_capture.py \
            core/endpoint_artifact_importer.py \
            core/tool_manifest_system.py \
            core/advisory_enrichment.py \
            core/scan_database.py \
            core/technology_test_planner.py \
            core/deepseek_dashboard_engine.py
