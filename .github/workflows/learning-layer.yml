name: VulnScope Learning Layer

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  compile-learning:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Compile learning modules
        run: |
          python -m py_compile \
            core/autonomous_learning_engine.py \
            core/learning_graph.py \
            core/self_healing_diagnostics.py \
            core/final_report_index.py
