name: VulnScope Orchestration Modules

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  compile-modules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Compile orchestration modules
        run: |
          python -m py_compile \
            vulnscope.py \
            core/security_orchestration_cli.py \
            core/scope_config.py \
            core/api_discovery.py \
            core/access_matrix.py \
            core/security_scorecard.py \
            core/final_report_index.py \
            core/deepseek_dashboard_engine.py \
            core/live_dashboard_v2.py
