name: CAI Superior Smoke Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install test dependency
        run: python -m pip install --upgrade pip pytest
      - name: Compile CAI Superior and launch modules
        run: |
          python -m py_compile \
            cai_error_handler.py \
            cai_scope_guard.py \
            cai_asset_graph.py \
            cai_target_profiler_cli.py \
            cai_recon_agent_cli.py \
            cai_superior_cli.py \
            kai_safe_interface.py \
            download_data_bundle_cli.py \
            main.py
      - name: Run CAI Superior unit tests
        run: python -m pytest tests/test_cai_superior_layer01.py tests/test_cai_confidence_policy.py -q
